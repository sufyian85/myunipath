<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MyUniPath emblem">
  <defs>
    <clipPath id="ec">
      <circle cx="32" cy="32" r="29"/>
    </clipPath>
    <linearGradient id="et" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1DCF0"/>
      <stop offset="100%" stop-color="#B8CCDF"/>
    </linearGradient>
    <linearGradient id="er" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e34628"/>
      <stop offset="100%" stop-color="#C63418"/>
    </linearGradient>
  </defs>

  <!-- White halo -->
  <circle cx="32" cy="32" r="32" fill="white"/>

  <!-- Silver top half -->
  <circle cx="32" cy="32" r="29" fill="url(#et)"/>

  <!-- Navy bottom -->
  <rect x="3" y="32" width="58" height="29" fill="#0F3361" clip-path="url(#ec)"/>

  <!-- Red stripe 1 -->
  <rect x="3" y="37" width="58" height="6" fill="url(#er)" clip-path="url(#ec)"/>
  <!-- Dark divider -->
  <rect x="3" y="43" width="58" height="2.5" fill="#071830" clip-path="url(#ec)"/>
  <!-- Red stripe 2 -->
  <rect x="3" y="45.5" width="58" height="15" fill="url(#er)" clip-path="url(#ec)"/>

  <!-- Route path line -->
  <path d="M15,29 C15,22 22,15 32,14 C40,14 46,17 49,21"
        fill="none" stroke="#0F3361" stroke-width="2.8"
        stroke-linecap="round" clip-path="url(#ec)"/>
  <!-- Origin dot -->
  <circle cx="15" cy="29" r="2.8" fill="#0F3361" clip-path="url(#ec)"/>
  <!-- Destination pin -->
  <circle cx="49" cy="21" r="5"   fill="#e34628" clip-path="url(#ec)"/>
  <circle cx="49" cy="21" r="2.2" fill="white"   clip-path="url(#ec)"/>

  <!-- Ring border -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#0F3361" stroke-width="1.5"/>
</svg>
