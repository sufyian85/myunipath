providers = ["php"]

[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_sqlite", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.bcmath", "php82Extensions.curl", "php82Extensions.fileinfo", "php82Extensions.openssl", "composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader", "php artisan config:clear", "php artisan cache:clear"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
