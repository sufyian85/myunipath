<svg viewBox="0 0 260 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MyUniPath logo">
  <defs>
    <clipPath id="emblem-clip">
      <circle cx="32" cy="32" r="29"/>
    </clipPath>
    <linearGradient id="top-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1DCF0"/>
      <stop offset="100%" stop-color="#B8CCDF"/>
    </linearGradient>
    <linearGradient id="red-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e34628"/>
      <stop offset="100%" stop-color="#C63418"/>
    </linearGradient>
  </defs>

  <!-- ── Circular Emblem ── -->

  <!-- Outer white halo ring -->
  <circle cx="32" cy="32" r="32" fill="white"/>

  <!-- Silver / light blue top half (UNITEN-inspired) -->
  <circle cx="32" cy="32" r="29" fill="url(#top-grad)"/>

  <!-- Navy bottom half -->
  <rect x="3" y="32" width="58" height="29" fill="#0F3361" clip-path="url(#emblem-clip)"/>

  <!-- Red stripe 1 -->
  <rect x="3" y="37" width="58" height="6" fill="url(#red-grad)" clip-path="url(#emblem-clip)"/>
  <!-- Dark divider stripe -->
  <rect x="3" y="43" width="58" height="2.5" fill="#071830" clip-path="url(#emblem-clip)"/>
  <!-- Red stripe 2 (thick bottom) -->
  <rect x="3" y="45.5" width="58" height="15" fill="url(#red-grad)" clip-path="url(#emblem-clip)"/>

  <!-- ── Path / Route Icon (upper silver half) ── -->
  <!-- Curved route line: bottom-left → arcs up → top-right -->
  <path d="M15,29 C15,22 22,15 32,14 C40,14 46,17 49,21"
        fill="none" stroke="#0F3361" stroke-width="2.8"
        stroke-linecap="round" clip-path="url(#emblem-clip)"/>
  <!-- Origin dot (small navy) -->
  <circle cx="15" cy="29" r="2.8" fill="#0F3361" clip-path="url(#emblem-clip)"/>
  <!-- Destination pin (red outer ring + white fill) = location marker -->
  <circle cx="49" cy="21" r="5" fill="#e34628" clip-path="url(#emblem-clip)"/>
  <circle cx="49" cy="21" r="2.2" fill="white" clip-path="url(#emblem-clip)"/>

  <!-- Navy border ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#0F3361" stroke-width="1.5"/>

  <!-- ── Text ── -->

  <!-- "MyUniPath" wordmark -->
  <text x="78" y="28"
        font-family="'Inter','Segoe UI','Arial Black',Arial,sans-serif"
        font-size="23" font-weight="800" fill="#0F3361" letter-spacing="-0.8">
    MyUniPath
  </text>

  <!-- Separator line -->
  <line x1="78" y1="33" x2="255" y2="33" stroke="#e5e7eb" stroke-width="1"/>

  <!-- "Programme Finder" subtitle -->
  <text x="79" y="46"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="9.5" font-weight="600" fill="#6B7280" letter-spacing="2.5">
    PROGRAMME FINDER
  </text>

  <!-- "CCI · UNITEN" affiliation -->
  <text x="79" y="59"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="8" fill="#9CA3AF" letter-spacing="1.2">
    CCI · UNITEN
  </text>
</svg>
